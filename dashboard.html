<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tekpair — Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#F7F9FC;color:#0F1729}
.topbar{background:#020B2E;padding:14px 18px;display:flex;align-items:center;justify-content:space-between}
.topbar-logo{color:white;font-size:18px;font-weight:700}
.topbar-user{color:rgba(255,255,255,.7);font-size:13px;display:flex;align-items:center;gap:10px}
.logout-btn{background:rgba(255,255,255,.1);border:none;color:white;padding:6px 12px;border-radius:7px;cursor:pointer;font-size:12px}
.content{padding:20px}
.welcome{font-size:20px;font-weight:700;color:#020B2E;margin-bottom:4px}
.date{font-size:13px;color:#64748B;margin-bottom:20px}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.stat{background:white;border-radius:12px;padding:16px;border:1px solid #E2E8F0}
.stat-n{font-size:24px;font-weight:800;color:#020B2E}
.stat-l{font-size:12px;color:#64748B;margin-top:3px}
.btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.btn{padding:14px;border-radius:11px;border:none;font-size:14px;font-weight:600;cursor:pointer;color:white}
.btn-blue{background:#0055FF}
.btn-green{background:#00C896}
.btn-orange{background:#F97316}
.btn-purple{background:#7C3AED}
.section-title{font-size:15px;font-weight:700;color:#020B2E;margin-bottom:10px}
.empty{text-align:center;padding:30px;color:#64748B;font-size:13px;background:white;border-radius:12px;border:1px solid #E2E8F0}
.nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid #E2E8F0;display:flex;padding:8px 0 16px}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:#64748B;font-size:10px;font-weight:500}
.ni.active{color:#0055FF}
.ni-icon{font-size:20px}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">T Tekpair</div>
  <div class="topbar-user">
    <span id="userName">---</span>
    <button class="logout-btn" onclick="logout()">Salir</button>
  </div>
</div>

<div class="content">
  <div class="welcome">Hola, <span id="greetName">---</span> 👋</div>
  <div class="date" id="dateStr"></div>

  <div class="stats">
    <div class="stat"><div class="stat-n" style="color:#0055FF">0</div><div class="stat-l">Ventas</div></div>
    <div class="stat"><div class="stat-n" style="color:#00C896">€0</div><div class="stat-l">Ingresos</div></div>
    <div class="stat"><div class="stat-n" style="color:#F97316">0</div><div class="stat-l">Reparaciones</div></div>
    <div class="stat"><div class="stat-n" style="color:#7C3AED">0</div><div class="stat-l">Stock libre</div></div>
  </div>

  <div class="btns">
    <button class="btn btn-blue">📱 Nueva Venta</button>
    <button class="btn btn-green">🔧 Nueva Reparación</button>
    <button class="btn btn-orange">📦 Añadir Stock</button>
    <button class="btn btn-purple">👤 Nuevo Cliente</button>
  </div>

  <div class="section-title">Últimas órdenes</div>
  <div class="empty">No hay órdenes aún.<br>¡Empieza a usar Tekpair!</div>
</div>

<div class="nav" style="padding-bottom:16px">
  <div class="ni active"><span class="ni-icon">🏠</span>Inicio</div>
  <div class="ni"><span class="ni-icon">📱</span>Ventas</div>
  <div class="ni"><span class="ni-icon">🔧</span>Reparac.</div>
  <div class="ni"><span class="ni-icon">📦</span>Stock</div>
  <div class="ni"><span class="ni-icon">👥</span>Clientes</div>
</div>

<script>
var user = null;
try { user = JSON.parse(localStorage.getItem('tk_user')); } catch(e) {}
if (!user) { window.location.href = 'app.html'; }
else {
  document.getElementById('userName').textContent = user.nombre;
  document.getElementById('greetName').textContent = user.nombre;
  document.getElementById('dateStr').textContent = new Date().toLocaleDateString('es',{weekday:'long',day:'numeric',month:'long'});
}
function logout() {
  localStorage.removeItem('tk_user');
  localStorage.removeItem('tk_tienda');
  window.location.href = 'app.html';
}
</script>
</body>
</html>
