<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- session_id en URL — sin esto se filtraría en el Referer header al navegar -->
<meta name="referrer" content="no-referrer">
<meta name="robots" content="noindex,nofollow">
<title>Tekpair — Cuenta creada</title>
<style>.lang-sel-ok{position:fixed;top:12px;right:12px;z-index:100;background:rgba(255,255,255,.95);border:1px solid #e2e8f0;border-radius:8px;padding:5px 10px;font-size:13px;cursor:pointer;font-family:inherit}</style>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#F7F9FC;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:white;border-radius:16px;padding:32px 24px;max-width:420px;width:100%;text-align:center;border:1px solid #E2E8F0}
.icon{font-size:56px;margin-bottom:16px}
h1{font-size:22px;font-weight:700;color:#020B2E;margin-bottom:8px}
p{color:#64748B;font-size:14px;margin-bottom:20px;line-height:1.6}
.btn{display:block;background:#0055FF;color:white;padding:14px;border-radius:9px;text-decoration:none;font-weight:700;font-size:15px;margin-bottom:10px}
.note{background:#FEF3C7;border-radius:9px;padding:12px;font-size:12px;color:#92400E;margin-bottom:20px}
.spinner{display:none;color:#64748B;font-size:13px;margin-bottom:16px}
</style>
  <script src="/cookies-consent.js" defer></script>
</head>
<body>
<select class="lang-sel-ok" id="okLangSel" onchange="localStorage.setItem('tp_lang',this.value)">
  <option value="es">🇪🇸</option><option value="en">🇬🇧</option><option value="fr">🇫🇷</option>
  <option value="it">🇮🇹</option><option value="de">🇩🇪</option><option value="pt">🇵🇹</option>
</select>
<div class="card">
  <div class="icon" id="icon">⏳</div>
  <h1 id="title">Creando tu cuenta...</h1>
  <p id="msg">Por favor espera un momento.</p>
  <div class="note" id="note" style="display:none"></div>
  <a href="https://www.tekpair.tech/app.html" class="btn" id="btnEntrar" style="display:none">Entrar a Tekpair →</a>
</div>

<script>

const REGOK_TEXTS = {
  es: { creating:'Creando tu cuenta...', creating_msg:'Por favor espera un momento.', ok_title:'Cuenta creada', ok_msg_pre:'Hola ', ok_msg_suf:' tu cuenta está lista. Te hemos enviado un email con tus credenciales de acceso.', ok_msg_no_name:'Tu cuenta está lista. Te hemos enviado un email con tus credenciales de acceso.', note:'📧 Revisa tu bandeja de entrada (y spam) para ver tu contraseña temporal.', btn:'Entrar a Tekpair →', exists_title:'Ya tienes cuenta', exists_msg:'Este email ya tiene una cuenta activa en Tekpair.', err_title:'Error', err_session:'No se encontró la sesión de pago. Vuelve a registrarte desde https://www.tekpair.tech/registro.html', err_conn:'No se pudo crear la cuenta. Por favor contacta con info@tekpair.tech' },
  en: { creating:'Creating your account...', creating_msg:'Please wait a moment.', ok_title:'Account created', ok_msg_pre:'Hello ', ok_msg_suf:' your account is ready. We have sent you an email with your login credentials.', ok_msg_no_name:'Your account is ready. We have sent you an email with your login credentials.', note:'📧 Check your inbox (and spam) for your temporary password.', btn:'Sign in to Tekpair →', exists_title:'Account already exists', exists_msg:'This email already has an active account on Tekpair.', err_title:'Error', err_session:'Payment session not found. Please register again at https://www.tekpair.tech/registro.html', err_conn:'Could not create the account. Please contact info@tekpair.tech' },
  fr: { creating:'Création de votre compte...', creating_msg:'Veuillez patienter un instant.', ok_title:'Compte créé', ok_msg_pre:'Bonjour ', ok_msg_suf:' votre compte est prêt. Nous vous avons envoyé un email avec vos identifiants.', ok_msg_no_name:'Votre compte est prêt. Nous vous avons envoyé un email avec vos identifiants.', note:'📧 Vérifiez votre boîte de réception (et spam) pour votre mot de passe temporaire.', btn:'Accéder à Tekpair →', exists_title:'Compte existant', exists_msg:'Cet email a déjà un compte actif sur Tekpair.', err_title:'Erreur', err_session:'Session de paiement introuvable. Veuillez vous réinscrire sur https://www.tekpair.tech/registro.html', err_conn:'Impossible de créer le compte. Contactez info@tekpair.tech' },
  it: { creating:'Creazione del tuo account...', creating_msg:'Attendi un momento.', ok_title:'Account creato', ok_msg_pre:'Ciao ', ok_msg_suf:' il tuo account è pronto. Ti abbiamo inviato un\'email con le tue credenziali.', ok_msg_no_name:'Il tuo account è pronto. Ti abbiamo inviato un\'email con le tue credenziali.', note:'📧 Controlla la posta in arrivo (e spam) per la tua password temporanea.', btn:'Accedi a Tekpair →', exists_title:'Account già esistente', exists_msg:'Questa email ha già un account attivo su Tekpair.', err_title:'Errore', err_session:'Sessione di pagamento non trovata. Registrati di nuovo su https://www.tekpair.tech/registro.html', err_conn:'Impossibile creare l\'account. Contatta info@tekpair.tech' },
  de: { creating:'Ihr Konto wird erstellt...', creating_msg:'Bitte warten Sie einen Moment.', ok_title:'Konto erstellt', ok_msg_pre:'Hallo ', ok_msg_suf:' Ihr Konto ist bereit. Wir haben Ihnen eine E-Mail mit Ihren Anmeldedaten gesendet.', ok_msg_no_name:'Ihr Konto ist bereit. Wir haben Ihnen eine E-Mail mit Ihren Anmeldedaten gesendet.', note:'📧 Prüfen Sie Ihren Posteingang (und Spam) für Ihr temporäres Passwort.', btn:'Bei Tekpair anmelden →', exists_title:'Konto existiert bereits', exists_msg:'Diese E-Mail hat bereits ein aktives Konto bei Tekpair.', err_title:'Fehler', err_session:'Zahlungssitzung nicht gefunden. Bitte registrieren Sie sich erneut unter https://www.tekpair.tech/registro.html', err_conn:'Konto konnte nicht erstellt werden. Kontaktieren Sie info@tekpair.tech' },
  pt: { creating:'A criar a tua conta...', creating_msg:'Por favor aguarda um momento.', ok_title:'Conta criada', ok_msg_pre:'Olá ', ok_msg_suf:' a tua conta está pronta. Enviámos-te um email com as tuas credenciais de acesso.', ok_msg_no_name:'A tua conta está pronta. Enviámos-te um email com as tuas credenciais de acesso.', note:'📧 Verifica a tua caixa de entrada (e spam) para ver a tua senha temporária.', btn:'Entrar no Tekpair →', exists_title:'Já tens conta', exists_msg:'Este email já tem uma conta ativa no Tekpair.', err_title:'Erro', err_session:'Sessão de pagamento não encontrada. Volta a registar-te em https://www.tekpair.tech/registro.html', err_conn:'Não foi possível criar a conta. Contacta info@tekpair.tech' }
};
function getOkLang(){ return localStorage.getItem('tp_lang') || navigator.language.slice(0,2) || 'es'; }

async function setup() {
  var params = new URLSearchParams(window.location.search);
  var session_id = params.get('session_id');

  // CHK-2 fix: ya no leemos email/nombre/tienda/plan de la URL (era una fuga
  // de datos personales hacia logs, historial y referrers). Ahora register.js
  // los extrae de session.metadata en Stripe.
  // Mantenemos lectura por compatibilidad con URLs viejas que pudieran estar
  // en circulación (refresh de pestañas que estaban abiertas):
  var emailLegacy = params.get('email');
  var nombreLegacy = params.get('nombre');
  var tiendaLegacy = params.get('tienda');
  var planLegacy = params.get('plan');

  if (!session_id) {
    var Ls = REGOK_TEXTS[getOkLang()]||REGOK_TEXTS.es;
    document.getElementById('icon').textContent = '❌';
    document.getElementById('title').textContent = Ls.err_title;
    document.getElementById('msg').textContent = Ls.err_session;
    return;
  }

  try {
    var body = {session_id: session_id};
    // Si por casualidad vienen en URL (compatibilidad), los enviamos también
    if (emailLegacy) body.email = emailLegacy;
    if (nombreLegacy) body.nombre = nombreLegacy;
    if (tiendaLegacy) body.tienda_nombre = tiendaLegacy;
    if (planLegacy) body.plan = planLegacy;

    var r = await fetch('/api/register', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body)
    });
    var data = await r.json();

    if (data.ok) {
      // El nombre puede venir en data.nombre (recomendado para el futuro) o de URL legacy
      var nombreMostrar = (data.nombre || nombreLegacy || '').trim();
      var L = REGOK_TEXTS[getOkLang()]||REGOK_TEXTS.es;
      document.getElementById('icon').textContent = '🎉';
      document.getElementById('title').textContent = L.ok_title;
      document.getElementById('msg').textContent = nombreMostrar ? L.ok_msg_pre + nombreMostrar + ', ' + L.ok_msg_suf : L.ok_msg_no_name;
      document.getElementById('note').textContent = L.note;
      document.getElementById('note').style.display = 'block';
      document.getElementById('btnEntrar').style.display = 'block';
      document.getElementById('btnEntrar').textContent = L.btn;
    } else {
      if (data.error && data.error.indexOf('ya') !== -1 && (data.error.indexOf('cuenta') !== -1 || data.error.indexOf('email') !== -1)) {
        var Le = REGOK_TEXTS[getOkLang()]||REGOK_TEXTS.es;
        document.getElementById('icon').textContent = '✅';
        document.getElementById('title').textContent = Le.exists_title;
        document.getElementById('msg').textContent = Le.exists_msg;
        document.getElementById('btnEntrar').style.display = 'block';
        document.getElementById('btnEntrar').textContent = Le.btn;
      } else {
        var Lerr = REGOK_TEXTS[getOkLang()]||REGOK_TEXTS.es;
        document.getElementById('icon').textContent = '❌';
        document.getElementById('title').textContent = Lerr.err_title;
        document.getElementById('msg').textContent = data.error || 'Error al crear la cuenta. Contacta con soporte.';
      }
    }
  } catch(e) {
    var Lc = REGOK_TEXTS[getOkLang()]||REGOK_TEXTS.es;
    document.getElementById('icon').textContent = '❌';
    document.getElementById('title').textContent = Lc.err_title;
    document.getElementById('msg').textContent = Lc.err_conn;
  }
}
setup();
</script>
</body>
</html>
