<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tekpair — Cuenta creada</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#F7F9FC;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:white;border-radius:16px;padding:32px 24px;max-width:420px;width:100%;text-align:center;border:1px solid #E2E8F0}
.icon{font-size:56px;margin-bottom:16px}
h1{font-size:22px;font-weight:700;color:#020B2E;margin-bottom:8px}
p{color:#64748B;font-size:14px;margin-bottom:20px;line-height:1.6}
.btn{display:block;background:#0055FF;color:white;padding:14px;border-radius:9px;text-decoration:none;font-weight:700;font-size:15px;margin-bottom:10px}
.note{background:#FEF3C7;border-radius:9px;padding:12px;font-size:12px;color:#92400E;margin-bottom:20px}
.spinner{display:none;color:#64748B;font-size:13px;margin-bottom:16px}
</style>
</head>
<body>
<div class="card">
  <div class="icon" id="icon">⏳</div>
  <h1 id="title">Creando tu cuenta...</h1>
  <p id="msg">Por favor espera un momento.</p>
  <div class="note" id="note" style="display:none"></div>
  <a href="https://tekpair.tech/app.html" class="btn" id="btnEntrar" style="display:none">Entrar a Tekpair →</a>
</div>

<script>
async function setup() {
  var params = new URLSearchParams(window.location.search);
  var session_id = params.get('session_id');

  // CHK-2 fix: ya no leemos email/nombre/tienda/plan de la URL (era una fuga
  // de datos personales hacia logs, historial y referrers). Ahora register.js
  // los extrae de session.metadata en Stripe.
  // Mantenemos lectura por compatibilidad con URLs viejas que pudieran estar
  // en circulación (refresh de pestañas que estaban abiertas):
  var emailLegacy = params.get('email');
  var nombreLegacy = params.get('nombre');
  var tiendaLegacy = params.get('tienda');
  var planLegacy = params.get('plan');

  if (!session_id) {
    document.getElementById('icon').textContent = '❌';
    document.getElementById('title').textContent = 'Error';
    document.getElementById('msg').textContent = 'No se encontró la sesión de pago. Vuelve a registrarte desde https://tekpair.tech/registro.html';
    return;
  }

  try {
    var body = {session_id: session_id};
    // Si por casualidad vienen en URL (compatibilidad), los enviamos también
    if (emailLegacy) body.email = emailLegacy;
    if (nombreLegacy) body.nombre = nombreLegacy;
    if (tiendaLegacy) body.tienda_nombre = tiendaLegacy;
    if (planLegacy) body.plan = planLegacy;

    var r = await fetch('/api/register', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body)
    });
    var data = await r.json();

    if (data.ok) {
      // El nombre puede venir en data.nombre (recomendado para el futuro) o de URL legacy
      var nombreMostrar = (data.nombre || nombreLegacy || '').trim();
      document.getElementById('icon').textContent = '🎉';
      document.getElementById('title').textContent = 'Cuenta creada';
      document.getElementById('msg').textContent = (nombreMostrar ? 'Hola ' + nombreMostrar + ', tu' : 'Tu') + ' cuenta está lista. Te hemos enviado un email con tus credenciales de acceso.';
      document.getElementById('note').textContent = '📧 Revisa tu bandeja de entrada (y spam) para ver tu contraseña temporal.';
      document.getElementById('note').style.display = 'block';
      document.getElementById('btnEntrar').style.display = 'block';
    } else {
      if (data.error && data.error.indexOf('ya') !== -1 && (data.error.indexOf('cuenta') !== -1 || data.error.indexOf('email') !== -1)) {
        document.getElementById('icon').textContent = '✅';
        document.getElementById('title').textContent = 'Ya tienes cuenta';
        document.getElementById('msg').textContent = 'Este email ya tiene una cuenta activa en Tekpair.';
        document.getElementById('btnEntrar').style.display = 'block';
      } else {
        document.getElementById('icon').textContent = '❌';
        document.getElementById('title').textContent = 'Error';
        document.getElementById('msg').textContent = data.error || 'Error al crear la cuenta. Contacta con soporte.';
      }
    }
  } catch(e) {
    document.getElementById('icon').textContent = '❌';
    document.getElementById('title').textContent = 'Error de conexión';
    document.getElementById('msg').textContent = 'No se pudo crear la cuenta. Por favor contacta con info@tekpair.tech';
  }
}
setup();
</script>
</body>
</html>
