<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- RES-1: el token de reset está en query string. Sin esto se filtra a cualquier sitio
     externo al que el usuario navegue desde aquí. -->
<meta name="referrer" content="no-referrer">
<meta name="robots" content="noindex,nofollow">
<title>Restablecer contraseña · TekPair</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: #f7f9fc;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #fff;
    border-radius: 18px;
    box-shadow: 0 8px 32px rgba(0,0,0,.10);
    width: 100%;
    max-width: 400px;
    overflow: hidden;
  }
  .head {
    background: #0F172A;
    padding: 26px;
    text-align: center;
  }
  .brand { font-size: 22px; font-weight: 800; color: #fff; }
  .brand .bolt { color: #FBBF24; }
  .body { padding: 28px 26px; }
  h1 { font-size: 19px; color: #0F172A; margin-bottom: 6px; }
  .sub { font-size: 13px; color: #64748b; margin-bottom: 20px; line-height: 1.5; }
  label { display: block; font-size: 12px; font-weight: 600; color: #334155; margin-bottom: 6px; }
  input[type=password] {
    width: 100%;
    padding: 11px 12px;
    border: 1px solid #e2e8f0;
    border-radius: 9px;
    font-size: 14px;
    font-family: inherit;
    margin-bottom: 14px;
  }
  input:focus { outline: none; border-color: #10B981; }
  button {
    width: 100%;
    padding: 12px;
    background: #10B981;
    color: #fff;
    border: none;
    border-radius: 9px;
    font-size: 15px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
  }
  button:disabled { opacity: .6; cursor: default; }
  .msg { font-size: 13px; margin-top: 14px; padding: 10px 12px; border-radius: 8px; display: none; }
  .msg.err { background: #fef2f2; color: #b91c1c; display: block; }
  .msg.ok { background: #f0fdf4; color: #15803d; display: block; }
  .foot { text-align: center; margin-top: 18px; }
  .foot a { color: #10B981; font-size: 13px; text-decoration: none; font-weight: 600; }
</style>
  <script src="/cookies-consent.js" defer></script>
</head>
<body>
<style>.lang-sel-reset{position:fixed;top:12px;right:12px;z-index:100;background:rgba(255,255,255,.95);border:1px solid #e2e8f0;border-radius:8px;padding:5px 10px;font-size:13px;cursor:pointer;font-family:inherit;box-shadow:0 2px 8px rgba(0,0,0,.08)}</style>
<select class="lang-sel-reset" id="resetLangSel" onchange="localStorage.setItem('tp_lang',this.value);applyResetLang(this.value)">
  <option value="es">🇪🇸</option><option value="en">🇬🇧</option><option value="fr">🇫🇷</option>
  <option value="it">🇮🇹</option><option value="de">🇩🇪</option><option value="pt">🇵🇹</option>
</select>
<div class="card">
  <div class="head">
    <div class="brand"><span class="bolt">&#9889;</span> TekPair</div>
  </div>
  <div class="body">
    <h1>Restablecer contraseña</h1>
    <div class="sub">Escribe tu nueva contraseña para acceder a TekPair.</div>

    <div id="form">
      <label for="pw1">Nueva contraseña</label>
      <input type="password" id="pw1" placeholder="Mínimo 8 caracteres" minlength="8" autocomplete="new-password">
      <label for="pw2">Repetir nueva contraseña</label>
      <input type="password" id="pw2" placeholder="Repite la contraseña" autocomplete="new-password">
      <button id="btn" onclick="enviarReset()">Guardar nueva contraseña</button>
    </div>

    <div class="msg" id="msg"></div>

    <div class="foot">
      <a href="/app.html">Volver al inicio de sesión</a>
    </div>
  </div>
</div>

<script>

const RESET_TEXTS = {
  es: { title:'Restablecer contraseña · TekPair', h1:'Restablecer contraseña', sub:'Escribe tu nueva contraseña para acceder a TekPair.', label1:'Nueva contraseña', label2:'Repetir nueva contraseña', ph1:'Mínimo 8 caracteres', ph2:'Repite la contraseña', btn:'Guardar nueva contraseña', btn_saving:'Guardando...', back:'Volver al inicio de sesión', err_len:'La contraseña debe tener al menos 8 caracteres.', err_match:'Las contraseñas no coinciden.', err_token:'Enlace no válido. Solicita un nuevo enlace de recuperación desde la pantalla de inicio de sesión.', err_conn:'Error de conexión. Inténtalo de nuevo.', ok_msg:'¡Contraseña actualizada! Te redirigimos al login en 3 segundos...' },
  en: { title:'Reset password · TekPair', h1:'Reset password', sub:'Enter your new password to access TekPair.', label1:'New password', label2:'Repeat new password', ph1:'Minimum 8 characters', ph2:'Repeat password', btn:'Save new password', btn_saving:'Saving...', back:'Back to login', err_len:'Password must be at least 8 characters.', err_match:'Passwords do not match.', err_token:'Invalid link. Request a new recovery link from the login screen.', err_conn:'Connection error. Please try again.', ok_msg:'Password updated! Redirecting to login in 3 seconds...' },
  fr: { title:'Réinitialiser le mot de passe · TekPair', h1:'Réinitialiser le mot de passe', sub:'Entrez votre nouveau mot de passe pour accéder à TekPair.', label1:'Nouveau mot de passe', label2:'Répéter le mot de passe', ph1:'Minimum 8 caractères', ph2:'Répétez le mot de passe', btn:'Enregistrer le nouveau mot de passe', btn_saving:'Enregistrement...', back:'Retour à la connexion', err_len:'Le mot de passe doit comporter au moins 8 caractères.', err_match:'Les mots de passe ne correspondent pas.', err_token:'Lien invalide. Demandez un nouveau lien depuis la page de connexion.', err_conn:'Erreur de connexion. Réessayez.', ok_msg:'Mot de passe mis à jour ! Redirection vers la connexion dans 3 secondes...' },
  it: { title:'Reimposta password · TekPair', h1:'Reimposta password', sub:'Inserisci la nuova password per accedere a TekPair.', label1:'Nuova password', label2:'Ripeti la password', ph1:'Minimo 8 caratteri', ph2:'Ripeti la password', btn:'Salva nuova password', btn_saving:'Salvataggio...', back:'Torna al login', err_len:'La password deve avere almeno 8 caratteri.', err_match:'Le password non corrispondono.', err_token:'Link non valido. Richiedi un nuovo link dalla schermata di login.', err_conn:'Errore di connessione. Riprova.', ok_msg:'Password aggiornata! Reindirizzamento al login in 3 secondi...' },
  de: { title:'Passwort zurücksetzen · TekPair', h1:'Passwort zurücksetzen', sub:'Geben Sie Ihr neues Passwort ein, um auf TekPair zuzugreifen.', label1:'Neues Passwort', label2:'Passwort wiederholen', ph1:'Mindestens 8 Zeichen', ph2:'Passwort wiederholen', btn:'Neues Passwort speichern', btn_saving:'Speichern...', back:'Zurück zur Anmeldung', err_len:'Das Passwort muss mindestens 8 Zeichen haben.', err_match:'Die Passwörter stimmen nicht überein.', err_token:'Ungültiger Link. Fordern Sie einen neuen Link auf der Anmeldeseite an.', err_conn:'Verbindungsfehler. Bitte erneut versuchen.', ok_msg:'Passwort aktualisiert! Weiterleitung zur Anmeldung in 3 Sekunden...' },
  pt: { title:'Redefinir palavra-passe · TekPair', h1:'Redefinir palavra-passe', sub:'Escreve a tua nova palavra-passe para aceder ao TekPair.', label1:'Nova palavra-passe', label2:'Repetir palavra-passe', ph1:'Mínimo 8 caracteres', ph2:'Repete a palavra-passe', btn:'Guardar nova palavra-passe', btn_saving:'A guardar...', back:'Voltar ao início de sessão', err_len:'A palavra-passe deve ter pelo menos 8 caracteres.', err_match:'As palavras-passe não coincidem.', err_token:'Link inválido. Solicita um novo link na página de início de sessão.', err_conn:'Erro de ligação. Tenta de novo.', ok_msg:'Palavra-passe atualizada! A redirecionar para o login em 3 segundos...' }
};
function getResetLang(){ return localStorage.getItem('tp_lang') || navigator.language.slice(0,2) || 'es'; }
function applyResetLang(lang) {
  var L = RESET_TEXTS[lang] || RESET_TEXTS.es;
  document.title = L.title;
  document.documentElement.lang = lang;
  var h1 = document.querySelector('h1'); if(h1) h1.textContent = L.h1;
  var sub = document.querySelector('.sub'); if(sub) sub.textContent = L.sub;
  var labels = document.querySelectorAll('label');
  if(labels[0]) labels[0].textContent = L.label1;
  if(labels[1]) labels[1].textContent = L.label2;
  var pw1 = document.getElementById('pw1'); if(pw1) pw1.placeholder = L.ph1;
  var pw2 = document.getElementById('pw2'); if(pw2) pw2.placeholder = L.ph2;
  var btn = document.getElementById('btn'); if(btn && btn.textContent !== L.btn_saving) btn.textContent = L.btn;
  var back = document.querySelector('.foot a'); if(back) back.textContent = L.back;
  var sel = document.getElementById('resetLangSel'); if(sel) sel.value = lang;
}

  function getToken() {
    var params = new URLSearchParams(window.location.search);
    return params.get('token') || '';
  }

  function mostrar(texto, tipo) {
    var m = document.getElementById('msg');
    m.textContent = texto;
    m.className = 'msg ' + tipo;
  }

  var TOKEN = getToken();
  if (!TOKEN) {
    document.getElementById('form').style.display = 'none';
    mostrar((RESET_TEXTS[getResetLang()]||RESET_TEXTS.es).err_token, 'err');
  }

  async function enviarReset() {
    var pw1 = document.getElementById('pw1').value || '';
    var pw2 = document.getElementById('pw2').value || '';

    var RL = RESET_TEXTS[getResetLang()]||RESET_TEXTS.es;
    if (pw1.length < 8) { mostrar(RL.err_len, 'err'); return; }
    if (pw1 !== pw2) { mostrar(RL.err_match, 'err'); return; }

    var btn = document.getElementById('btn');
    btn.disabled = true;
    btn.textContent = 'Guardando...';

    try {
      var r = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'reset', token: TOKEN, password_nueva: pw1 })
      });
      var data = await r.json();

      if (data && data.ok) {
        // RES-2: limpiar token de la URL tras éxito.
        // Si el usuario comparte screenshot o hace history.back, no debe quedar el token.
        try { history.replaceState({}, '', '/reset.html'); } catch (e) {}
        document.getElementById('form').style.display = 'none';
        mostrar((RESET_TEXTS[getResetLang()]||RESET_TEXTS.es).ok_msg, 'ok');
        setTimeout(function(){ window.location.href = '/app.html'; }, 3000);
      } else {
        mostrar((data && data.error) || 'No se pudo restablecer la contraseña.', 'err');
        btn.disabled = false;
        btn.textContent = 'Guardar nueva contraseña';
      }
    } catch (e) {
      mostrar((RESET_TEXTS[getResetLang()]||RESET_TEXTS.es).err_conn, 'err');
      btn.disabled = false;
      btn.textContent = 'Guardar nueva contraseña';
    }
  }
  document.addEventListener('DOMContentLoaded', function(){ applyResetLang(getResetLang()); });
</script>
<footer style="position:fixed;bottom:8px;left:0;right:0;text-align:center;font-size:11px;color:#94a3b8;z-index:2">
  <a href="/aviso-legal.html" style="color:inherit">Aviso legal</a> · <a href="/privacidad.html" style="color:inherit">Privacidad</a> · <a href="/terminos.html" style="color:inherit">Términos</a> · <a href="/cookies.html" style="color:inherit">Cookies</a>
</footer>
</body>
</html>
