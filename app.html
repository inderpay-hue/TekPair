<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TekPair — Iniciar sesión</title>
<script>(function(){try{var s=JSON.parse(localStorage.getItem('tk_sess')||'null');if(s&&s.token&&!sessionStorage.getItem('tk_app_redir')){sessionStorage.setItem('tk_app_redir','1');location.replace('dashboard.html');}}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --orange:#FF5B1F;--orange-d:#C2491A;--orange-l:#FFF1EB;
  --ink:#020B2E;--ink-soft:#3D3A34;--muted:#5A6472;--faint:#8A94A6;
  --paper:#F7F9FC;--paper-2:#EEF2F8;--line:#E2E8F0;--card:#FFFFFF;
  --green:#00C896;--red:#EF4444;
  --sans:'Inter',-apple-system,system-ui,sans-serif;
  --display:'Space Grotesk',var(--sans);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);background:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden;-webkit-font-smoothing:antialiased}
.aurora{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(600px circle at 25% 25%,rgba(255,91,31,.16),transparent 60%),radial-gradient(500px circle at 80% 80%,rgba(255,91,31,.10),transparent 55%)}
.grid-bg{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.035) 1px,transparent 1px);background-size:34px 34px}
.box{position:relative;z-index:1;background:var(--card);border-radius:20px;padding:36px;width:100%;max-width:400px;box-shadow:0 30px 70px -20px rgba(0,0,0,.5);animation:rise .6s cubic-bezier(.2,.7,.2,1)}
@keyframes rise{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.logo{display:flex;align-items:center;gap:11px;margin-bottom:30px}
.logo-bolt{width:38px;height:38px;background:var(--orange);border-radius:10px;display:flex;align-items:center;justify-content:center}
.logo-bolt svg{width:21px;height:21px;fill:#fff}
.ln{font-family:var(--display);font-size:22px;font-weight:700;color:var(--ink);letter-spacing:-.02em}
.ln span{color:var(--orange)}
h2{font-family:var(--display);font-size:25px;font-weight:700;color:var(--ink);margin-bottom:6px;letter-spacing:-.02em}
.lead{font-size:14px;color:var(--muted);margin-bottom:28px}
label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px}
input{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:13px 14px;font-size:14px;color:var(--ink);outline:none;margin-bottom:16px;font-family:var(--sans);transition:border-color .15s,box-shadow .15s;background:var(--paper)}
input:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(255,91,31,.12);background:#fff}
button{width:100%;background:var(--orange);color:#fff;border:none;padding:14px;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:var(--sans);transition:transform .15s,box-shadow .15s}
button:hover{transform:translateY(-1px);box-shadow:0 10px 24px -8px rgba(255,91,31,.5)}
button:active{transform:translateY(0)}
button:disabled{background:var(--faint);cursor:not-allowed;transform:none;box-shadow:none}
.err{font-size:13px;text-align:center;margin-top:12px;min-height:18px;color:var(--red)}
.foot{text-align:center;margin-top:18px;font-size:13px;color:var(--muted)}
.foot a{color:var(--orange);text-decoration:none;font-weight:600}
.foot a:hover{text-decoration:underline}
@media(prefers-reduced-motion:reduce){.box{animation:none}.aurora{display:none}button:hover{transform:none}}
</style>
<script src="/lang/lang.v8.js?v=20260621z"></script>
  <script src="/login-i18n.js?v=3e7885d"></script>
  <script src="/cookies-consent.js" defer></script>
</head>
<body>
<div class="aurora"></div>
<div class="grid-bg"></div>
<div class="box">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:28px">
    <a href="/" style="display:inline-flex;align-items:center;text-decoration:none">
      <div class="logo-bolt"><svg viewBox="0 0 24 24"><path d="M13 2 L4 14 H10 L9 22 L20 9 H13 Z"/></svg></div>
      <span class="ln" style="margin-left:10px">Tek<span>Pair</span></span>
    </a>
    <select aria-label="Idioma / Language" id="loginLangSel" onchange="setLoginLang(this.value)" style="background:var(--paper);border:1.5px solid var(--line);color:var(--ink);padding:7px 12px;border-radius:8px;font-size:13px;cursor:pointer;font-weight:500;font-family:var(--sans);outline:none">
      <option value="es">🇪🇸 Español</option>
      <option value="en">🇬🇧 English</option>
      <option value="fr">🇫🇷 Français</option>
      <option value="it">🇮🇹 Italiano</option>
      <option value="de">🇩🇪 Deutsch</option>
      <option value="pt">🇵🇹 Português</option>
    </select>
  </div>
  <h2 id="loginTitle">Bienvenido de nuevo</h2>
  <p class="lead" id="loginSubtitle">Inicia sesión en tu tienda</p>
  <form id="loginForm" onsubmit="return false">
  <label id="loginEmailLabel" for="em">Email</label>
  <input type="email" id="em" name="email" autocomplete="email" required placeholder="tu@email.com" />
  <label id="loginPassLabel" for="pw">Contraseña</label>
  <input type="password" id="pw" name="password" autocomplete="current-password" required placeholder="••••••••" />
  <button id="btn" type="button">Entrar</button>
  </form>
  <div class="err" id="err"></div>
  <div style="text-align:center;margin-top:14px">
    <a id="lnkVolver" href="/" style="font-size:12px;color:var(--muted);text-decoration:none;transition:color .15s" onmouseover="this.style.color='var(--orange)'" onmouseout="this.style.color='var(--muted)'">← Volver a tekpair.tech</a>
  </div>
  <div class="foot"><a href="#" id="lnkReset">¿Olvidaste tu contraseña?</a></div>
  <div class="foot" id="loginRegFoot">¿No tienes cuenta? <a href="/registro.html">Regístrate gratis</a></div>
</div>
<script>


function entrar() {
  var em = document.getElementById('em').value;
  var pw = document.getElementById('pw').value;
  if (!em || !pw) { document.getElementById('err').textContent = (LOGIN_TEXTS[localStorage.getItem('tp_lang')||'es']||LOGIN_TEXTS.es).rellena; return; }
  document.getElementById('err').textContent = '';
  document.getElementById('btn').disabled = true;
  document.getElementById('btn').textContent = (LOGIN_TEXTS[localStorage.getItem('tp_lang')||'es']||LOGIN_TEXTS.es).entrando;
  fetch('/api/login', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({email: em, password: pw, lang: localStorage.getItem('tp_lang')||'es'})
  }).then(function(r){ return r.json(); }).then(function(data){
    if (data.ok) {
      localStorage.setItem('tk_user', JSON.stringify(data.usuario));
      localStorage.setItem('tk_tienda', JSON.stringify(data.tienda));
      localStorage.setItem('tk_sess', JSON.stringify(data));
      window.location.href = 'dashboard.html';
    } else {
      document.getElementById('btn').textContent = (LOGIN_TEXTS[localStorage.getItem('tp_lang')||'es']||LOGIN_TEXTS.es).btn;
      document.getElementById('btn').disabled = false;
      document.getElementById('err').textContent = data.error || 'Error al entrar';
    }
  }).catch(function(err){
    console.error('Login error:', err);
    document.getElementById('btn').textContent = (LOGIN_TEXTS[localStorage.getItem('tp_lang')||'es']||LOGIN_TEXTS.es).btn;
    document.getElementById('btn').disabled = false;
    document.getElementById('err').textContent = (LOGIN_TEXTS[localStorage.getItem('tp_lang')||'es']||LOGIN_TEXTS.es).error_conn;
  });
  return;
}
document.getElementById('btn').onclick = entrar;
function olvidePassword() {
  var em = (document.getElementById('em').value || '').trim();
  if (!em) {
    em = prompt('Escribe tu email para recibir el enlace de recuperaci\u00f3n:');
    if (!em) return;
    em = em.trim();
  }
  var errEl = document.getElementById('err');
  errEl.style.color = '#64748b';
  errEl.textContent = 'Enviando...';
  fetch('/api/login', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ action: 'solicitar-reset', email: em, lang: localStorage.getItem('tp_lang') || 'es' })
  }).then(function(r){ return r.json(); }).then(function(data){
    if (data && data.ok) {
      errEl.style.color = '#15803d';
      errEl.textContent = 'Si el email est\u00e1 registrado, recibir\u00e1s un enlace para restablecer tu contrase\u00f1a. Revisa tu correo.';
    } else {
      errEl.style.color = '';
      errEl.textContent = (data && data.error) || 'No se pudo enviar';
    }
  }).catch(function(){
    errEl.style.color = '';
    errEl.textContent = 'Error de conexi\u00f3n. Intenta de nuevo.';
  });
}
var _lnkR = document.getElementById('lnkReset');
if (_lnkR) _lnkR.onclick = function(e){ e.preventDefault(); olvidePassword(); };
document.getElementById('pw').onkeypress = function(e){ if(e.key==='Enter') entrar(); };
document.getElementById('em').onkeypress = function(e){ if(e.key==='Enter') entrar(); };
</script>
<footer style="position:fixed;bottom:8px;left:0;right:0;text-align:center;font-size:11px;color:#94a3b8;z-index:2">

</footer>

</html>
