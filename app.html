<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tekpair</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#020B2E;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.box{background:white;border-radius:20px;padding:36px;width:100%;max-width:380px}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.lm{width:40px;height:40px;background:#0055FF;border-radius:10px;color:white;font-size:20px;font-weight:800;display:flex;align-items:center;justify-content:center}
.ln{font-size:22px;font-weight:700;color:#020B2E}
h2{font-size:24px;font-weight:700;color:#020B2E;margin-bottom:6px}
p{font-size:14px;color:#64748B;margin-bottom:28px}
label{font-size:11px;font-weight:600;color:#64748B;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px}
input{width:100%;border:1.5px solid #E2E8F0;border-radius:10px;padding:13px 14px;font-size:14px;color:#0F1729;outline:none;margin-bottom:16px;font-family:Arial}
input:focus{border-color:#0055FF}
button{width:100%;background:#0055FF;color:white;border:none;padding:14px;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:Arial}
.err{color:#EF4444;font-size:13px;text-align:center;margin-top:10px;min-height:18px}
.foot{text-align:center;margin-top:18px;font-size:13px;color:#64748B}
.foot a{color:#0055FF;text-decoration:none;font-weight:600}
</style>
</head>
<body>
<div class="box">
  <div class="logo">
    <div class="lm">T</div>
    <span class="ln">Tekpair</span>
  </div>
  <h2>Bienvenido</h2>
  <p>Inicia sesion en tu tienda</p>
  <label>Email</label>
  <input type="email" id="em" placeholder="tu@email.com" />
  <label>Contrasena</label>
  <input type="password" id="pw" placeholder="••••••••" />
  <button id="btn">Entrar</button>
  <div class="err" id="err"></div>
  <div class="foot">No tienes cuenta? <a href="/registro.html">Registrate gratis</a></div>
</div>
<script>
function entrar() {
  var em = document.getElementById('em').value;
  var pw = document.getElementById('pw').value;
  if (!em || !pw) { document.getElementById('err').textContent = 'Rellena todos los campos'; return; }
  document.getElementById('err').textContent = '';
  document.getElementById('btn').textContent = 'Entrando...';
  var nom = em.split('@')[0];
  nom = nom.charAt(0).toUpperCase() + nom.slice(1);
  localStorage.setItem('tk_user', JSON.stringify({nombre:nom,email:em,rol:'admin'}));
  localStorage.setItem('tk_tienda', JSON.stringify({nombre:'Mi Tienda'}));
  window.location.href = 'dashboard.html';
}
document.getElementById('btn').onclick = entrar;
document.getElementById('pw').onkeypress = function(e){ if(e.key==='Enter') entrar(); };
</script>
</body>
</html>
