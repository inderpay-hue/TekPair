<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Página no encontrada · TekPair</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<style>
  :root { --orange:#FF5B1F; --ink:#0F1729; --muted:#64748B; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    background:linear-gradient(160deg,#fff 0%,#FFF6F1 100%);
    color:var(--ink); min-height:100vh;
    display:flex; align-items:center; justify-content:center; text-align:center; padding:24px;
  }
  .box { max-width:440px; }
  .logo { font-size:30px; font-weight:800; letter-spacing:-.5px; margin-bottom:28px; }
  .logo .bolt { color:var(--orange); }
  .code { font-size:90px; font-weight:900; line-height:1; color:var(--orange); letter-spacing:-3px; }
  h1 { font-size:22px; font-weight:800; margin:14px 0 8px; }
  p { font-size:14.5px; color:var(--muted); line-height:1.6; margin-bottom:26px; }
  .btn {
    display:inline-block; background:var(--orange); color:#fff; text-decoration:none;
    font-size:14px; font-weight:700; padding:12px 24px; border-radius:11px;
    transition:transform .12s ease, box-shadow .12s ease; box-shadow:0 6px 18px rgba(255,91,31,.28);
  }
  .btn:hover { transform:translateY(-1px); box-shadow:0 9px 24px rgba(255,91,31,.34); }
  .links { margin-top:18px; font-size:12.5px; }
  .links a { color:var(--muted); text-decoration:none; margin:0 8px; }
  .links a:hover { color:var(--orange); }
</style>
</head>
<body>
  <div class="box">
    <div class="logo">⚡ Tek<span class="bolt">Pair</span></div>
    <div class="code">404</div>
    <h1>Esta página no existe</h1>
    <p>El enlace puede estar roto o la página se ha movido. Vuelve al inicio y sigue desde ahí.</p>
    <a class="btn" href="/">← Volver al inicio</a>
    <div class="links">
      <a href="/app.html">Entrar a mi tienda</a> ·
      <a href="/registro.html">Crear cuenta</a>
    </div>
  </div>
</body>
</html>
