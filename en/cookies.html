    '<h1>Cookie-Richtlinie</h1><div class="date">Zuletzt aktualisiert: 15. Juni 2026</div>'+

    '<h2>2. Verwendete Cookies</h2><table><thead><tr><th>Typ</th><th>Anbieter</th><th>Zweck</th><th>Einwilligung</th></tr></thead><tbody>'+
    '<tr><td>Technisch / notwendig</td><td>Tekpair (eigene)</td><td>Sitzung, Sprache und Einstellungen speichern.</td><td>Nicht erforderlich (ausgenommen)</td></tr>'+

function revocar(){ try{localStorage.removeItem('tp_cookie_consent');}catch(e){} location.reload(); }
function setLegalLang(lang){
  var l = LEGAL_COOKIES[lang] ? lang : 'es';
  try{ localStorage.setItem('tp_lang', l); }catch(e){}
  document.documentElement.lang = l;
  document.getElementById('legalBody').innerHTML = LEGAL_COOKIES[l].html;
  var nb = document.getElementById('navBack'); if(nb) nb.textContent = LEGAL_COOKIES[l].back;
  var sel = document.getElementById('legalLangSel'); if(sel) sel.value = l;
  var titles = {es:'Política de Cookies',en:'Cookie Policy',fr:'Politique de cookies',it:'Politica sui cookie',de:'Cookie-Richtlinie',pt:'Política de Cookies'};
  document.title = titles[l] + ' — Tekpair';
}
(function(){ var l = (localStorage.getItem('tp_lang') || (navigator.language||'es').slice(0,2)); setLegalLang(LEGAL_COOKIES[l]?l:'es'); })();
try{setLegalLang('en');}catch(e){}
