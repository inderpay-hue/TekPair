function _render(L){
  var h = '<h1>'+L.h1+'</h1><div class="date">'+L.date+'</div><div class="highlight">'+L.hi+'</div>';
  L.s.forEach(function(sec){
    h += '<h2>'+sec.h+'</h2>';
    sec.b.forEach(function(blk){
      if (Array.isArray(blk)) h += '<ul>'+blk.map(function(li){return '<li>'+li+'</li>';}).join('')+'</ul>';
      else h += '<p>'+blk+'</p>';
    });
  });
  return h;
}
