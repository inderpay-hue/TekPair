<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sin conexión — TekPair</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#FFF7F5;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.card{background:white;border-radius:20px;padding:40px 32px;text-align:center;max-width:360px;border:1px solid #FFD9C9}
.icon{width:72px;height:72px;background:#FFF7F5;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:32px}
h1{font-size:22px;font-weight:700;color:#1A0A00;margin-bottom:8px}
p{font-size:14px;color:#9E5A2A;line-height:1.6;margin-bottom:24px}
.btn{display:inline-block;background:#C2410C;color:white;padding:12px 28px;border-radius:10px;font-size:14px;font-weight:600;text-decoration:none;cursor:pointer;border:none;font-family:inherit}
.badge{display:inline-flex;align-items:center;gap:6px;background:#FFF1EB;color:#C2410C;font-size:12px;font-weight:600;padding:6px 14px;border-radius:20px;margin-top:16px}
</style>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-7V1W6B6KP4"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-7V1W6B6KP4');
</script>
</head>
<body>
<div class="card">
  <div class="icon">📡</div>
  <h1>Sin conexión</h1>
  <p>No hay conexión a internet en este momento. Los cambios que hagas se sincronizarán automáticamente cuando vuelvas a conectarte.</p>
  <button class="btn" onclick="location.reload()">Reintentar</button>
  <div class="badge">⚡ TekPair — Modo offline</div>
</div>
</body>
</html>
